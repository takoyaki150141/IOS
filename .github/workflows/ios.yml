name: Build Flutter iOS (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Packages
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Locate Runner.app
        run: |
          echo "Searching for Runner.app..."
          find build -name "Runner.app" -type d

      - name: Create Runner.ipa.zip
        run: |
          set -e

          APP_PATH=$(find build -name "Runner.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found!"
            exit 1
          fi

          echo "Using:"
          echo "$APP_PATH"

          rm -rf Payload
          rm -f Runner.ipa.zip

          mkdir Payload

          cp -R "$APP_PATH" Payload/

          /usr/bin/zip -qry Runner.ipa.zip Payload

          echo ""
          echo "===== CREATED ====="
          ls -lh Runner.ipa.zip

          echo ""
          echo "===== CONTENTS ====="
          unzip -l Runner.ipa.zip | head -20

      - name: Upload Runner.ipa.zip
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa.zip
          path: Runner.ipa.zip
          if-no-files-found: error

      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: Runner.app
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Release-iphoneos/Runner.app
          if-no-files-found: warn

      - name: Show Build Tree
        if: always()
        run: |
          echo "===== BUILD TREE ====="
          find build -print