name: Build Flutter iOS (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get Packages
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Locate Runner.app
        run: |
          echo "Searching Runner.app..."
          find build -name "Runner.app" -type d

      - name: Create Unsigned IPA
        run: |
          set -e

          APP_PATH=$(find build -name "Runner.app" -type d | head -1)

          echo "Using app:"
          echo "$APP_PATH"

          rm -rf Payload
          rm -f Runner.ipa

          mkdir Payload

          cp -R "$APP_PATH" Payload/

          /usr/bin/zip -qry Runner.ipa Payload

          echo "===== IPA INFO ====="
          ls -lh Runner.ipa
          unzip -l Runner.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Runner-Unsigned-IPA
          path: Runner.ipa
          if-no-files-found: error

      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: Runner-App
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/Release-iphoneos/Runner.app
          if-no-files-found: warn

      - name: Show Build Files
        if: always()
        run: |
          echo "===== BUILD TREE ====="
          find build -print